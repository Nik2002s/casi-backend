version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/" 

    schedule:
      interval: "daily"

    open-pull-requests-limit: 10

    labels:
      - "dependabot"
      - "backend"

    commit-message:
      prefix: "deps(backend)"

  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "weekly"

    labels:
      - "dependabot"

    commit-message:
      prefix: "deps(ci)"
