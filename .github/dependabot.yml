version: 2

updates:

* package-ecosystem: "pip"
  directory: "/"

  schedule:
  interval: "weekly"

  open-pull-requests-limit: 1

  groups:
  all-dependencies:
  patterns:
  - "*"

  labels:

  * "dependabot"
  * "backend"

  commit-message:
  prefix: "deps(backend)"

* package-ecosystem: "github-actions"
  directory: "/"

  schedule:
  interval: "monthly"

  open-pull-requests-limit: 1

  groups:
  github-actions:
  patterns:
  - "*"

  labels:

  * "dependabot"

  commit-message:
  prefix: "deps(ci)"
